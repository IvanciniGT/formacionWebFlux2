# H2 en memoria via R2DBC (solo para tests)
spring.r2dbc.url=r2dbc:h2:mem:///animalitos;DB_CLOSE_DELAY=-1
spring.r2dbc.username=sa
spring.r2dbc.password=

# R2DBC NO genera DDL como Hibernate; cargamos el schema a mano.
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# Activar el uso de virtual threads Java 21+)
#spring.threads.virtual.enabled=true
# Y esto ya me permite tener un huevo de hilos más para atender peticiones concurrentes sin bloquear el servidor.