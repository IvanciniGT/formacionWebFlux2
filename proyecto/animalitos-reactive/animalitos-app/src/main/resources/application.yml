spring:
  # H2 en memoria via R2DBC. R2DBC NO genera DDL automaticamente,
  # asi que cargamos el schema con sql.init.
  r2dbc:
    url: r2dbc:h2:mem:///animalitos;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

server:
  port: 8080

logging:
  level:
    com.curso.animalitos: INFO
